  <path d="M19 4 H21 V6 M21 4 L17 8" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M5 20 H3 V18 M3 20 L7 16" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Small curly brackets showing code format -->
  <text x="12" y="9.5" font-family="sans-serif" font-size="5" font-weight="900" fill="#ffffff" text-anchor="middle">{ }</text>
</svg>
